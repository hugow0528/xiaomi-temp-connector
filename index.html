<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米溫濕度計雙機大數據儀表板</title>
    <!-- 引入 Chart.js 畫圖表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #0071e3; }
        .control-panel { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; }
        button {
            background-color: #0071e3; color: white; border: none; padding: 12px 24px;
            font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #0077ed; }
        .clear-btn { background-color: #ff3b30; }
        .clear-btn:hover { background-color: #ff453a; }
        .devices-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .devices-container { grid-template-columns: 1fr; } }
        .card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative;
        }
        .device-mac { font-size: 12px; color: #86868b; font-family: monospace; }
        .data-grid { display: flex; justify-content: space-between; margin-top: 15px; }
        .data-item { text-align: center; flex: 1; }
        .data-val { font-size: 28px; font-weight: bold; color: #0071e3; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .log-box { max-height: 120px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Mijia Dual-Device Big Data Dashboard</h1>
    
    <div class="control-panel">
        <button id="connectBtn">連接一部新溫度計</button>
        <button id="clearDbBtn" class="clear-btn">清除本地所有大數據</button>
    </div>

    <!-- 顯示兩部裝置數據的區域 -->
    <div class="devices-container">
        <!-- 裝置 1 -->
        <div class="card" id="devCard1">
            <h3>裝置 1 <span id="devName1" class="device-mac">(未連接)</span></h3>
            <div class="data-grid">
                <div class="data-item"><div>溫度</div><span id="temp1" class="data-val">--</span>°C</div>
                <div class="data-item"><div>濕度</div><span id="hum1" class="data-val">--</span>%</div>
                <div class="data-item"><div>電量</div><span id="bat1" class="data-val">--</span>%</div>
            </div>
            <div class="log-box" id="logBox1">等候數據...</div>
        </div>

        <!-- 裝置 2 -->
        <div class="card" id="devCard2">
            <h3>裝置 2 <span id="devName2" class="device-mac">(未連接)</span></h3>
            <div class="data-grid">
                <div class="data-item"><div>溫度</div><span id="temp2" class="data-val">--</span>°C</div>
                <div class="data-item"><div>濕度</div><span id="hum2" class="data-val">--</span>%</div>
                <div class="data-item"><div>電量</div><span id="bat2" class="data-val">--</span>%</div>
            </div>
            <div class="log-box" id="logBox2">等候數據...</div>
        </div>
    </div>

    <!-- 大數據折線圖表 -->
    <div class="chart-card">
        <h3>即時大數據趨勢圖 (動態更新)</h3>
        <canvas id="envChart" style="width:100%; height:300px;"></canvas>
    </div>

    <script>
        const MI_SERVICE_UUID = 'ebe0ccb0-7a0a-4b0c-8a1a-6ff2997da3a6';
        const LIVE_DATA_UUID  = 'ebe0ccc1-7a0a-4b0c-8a1a-6ff2997da3a6';
        const BATTERY_UUID    = 'ebe0ccc4-7a0a-4b0c-8a1a-6ff2997da3a6';

        let activeDevices = []; // 儲存已連線的裝置物件
        let db;
        let envChart;

        // 1. 初始化 IndexedDB 大數據庫
        const request = indexedDB.open("MijiaBigData", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadHistoricalDataToChart(); // 開啟網頁時載入舊數據落圖表
        };

        // 2. 初始化 Chart.js 圖表
        const ctx = document.getElementById('envChart').getContext('2d');
        envChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '裝置 1 溫度 (°C)', borderColor: '#0071e3', data: [], yAxisID: 'y', tension: 0.2 },
                    { label: '裝置 2 溫度 (°C)', borderColor: '#34c759', data: [], yAxisID: 'y', tension: 0.2 }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { type: 'linear', position: 'left', title: { display: true, text: '溫度 (°C)' } }
                }
            }
        });

        // 3. 連接新裝置邏輯
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (activeDevices.length >= 2) {
                alert("目前網頁設計最多支援同時連線 2 部溫度計！");
                return;
            }

            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LYWSD03MMC' }],
                    optionalServices: [MI_SERVICE_UUID]
                });

                // 檢查係咪已經連緊
                if (activeDevices.some(d => d.id === device.id)) {
                    alert("呢部溫度計已經連線緊喇！");
                    return;
                }

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(MI_SERVICE_UUID);
                
                // 分配槽位 (Slot 1 或 Slot 2)
                const slot = activeDevices.length + 1;
                activeDevices.push({ id: device.id, name: device.name, slot: slot });

                document.getElementById(`devName${slot}`).innerText = `(${device.name})`;

                // 讀取電量
                try {
                    const batChar = await service.getCharacteristic(BATTERY_UUID);
                    const batValue = await batChar.readValue();
                    document.getElementById(`bat${slot}`).innerText = batValue.getUint8(0);
                } catch(e) { console.log("讀取電量失敗", e); }

                // 訂閱即時溫濕度
                const liveChar = await service.getCharacteristic(LIVE_DATA_UUID);
                await liveChar.startNotifications();
                
                liveChar.addEventListener('characteristicvaluechanged', (event) => {
                    const data = event.target.value;
                    const temp = data.getInt16(0, true) / 100;
                    const hum = data.getUint8(2);
                    const timestamp = new Date();

                    // 更新 UI
                    document.getElementById(`temp${slot}`).innerText = temp.toFixed(1);
                    document.getElementById(`hum${slot}`).innerText = hum;

                    const logBox = document.getElementById(`logBox${slot}`);
                    logBox.innerHTML = `[${timestamp.toLocaleTimeString()}] ${temp}°C / ${hum}%<br>` + logBox.innerHTML;

                    // 寫入大數據庫 IndexedDB
                    saveDataToDb(slot, temp, hum, timestamp);

                    // 即時更新圖表
                    const timeStr = timestamp.toLocaleTimeString();
                    if (!envChart.data.labels.includes(timeStr)) {
                        envChart.data.labels.push(timeStr);
                        if(envChart.data.labels.length > 30) envChart.data.labels.shift(); // 畫面只保留最近30條紀錄
                    }
                    
                    const datasetIdx = slot - 1;
                    envChart.data.datasets[datasetIdx].data.push(temp);
                    if(envChart.data.datasets[datasetIdx].data.length > 30) envChart.data.datasets[datasetIdx].data.shift();
                    
                    envChart.update();
                });

                device.addEventListener('gattserverdisconnected', () => {
                    document.getElementById(`devName${slot}`).innerText = "(已斷開)";
                    activeDevices = activeDevices.filter(d => d.id !== device.id);
                });

            } catch (error) {
                alert(`連線出錯: ${error.message}`);
            }
        });

        // 4. IndexedDB 寫入操作
        function saveDataToDb(slot, temp, hum, time) {
            if (!db) return;
            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            store.add({
                deviceSlot: slot,
                temperature: temp,
                humidity: hum,
                timestamp: time.getTime()
            });
        }

        // 5. 從大數據庫載入歷史數據落圖表 (畫出之前的趨勢)
        function loadHistoricalDataToChart() {
            if (!db) return;
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.openCursor(null, "prev"); // 攞最近嘅紀錄
            let count = 0;

            request.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor && count < 50) {
                    const log = cursor.value;
                    const timeLabel = new Date(log.timestamp).toLocaleTimeString();
                    
                    // 呢度做簡易歷史數據點回填，新連線會直接加喺後面
                    count++;
                    cursor.continue();
                }
            };
        }

        // 6. 清除大數據按鈕
        document.getElementById('clearDbBtn').addEventListener('click', () => {
            if(confirm("你確定要刪除瀏覽器入面儲存嘅所有環境歷史大數據嗎？")) {
                const transaction = db.transaction(["logs"], "readwrite");
                const store = transaction.objectStore("logs");
                const request = store.clear();
                request.onsuccess = () => {
                    alert("大數據庫已完全清空！");
                    envChart.data.labels = [];
                    envChart.data.datasets[0].data = [];
                    envChart.data.datasets[1].data = [];
                    envChart.update();
                };
            }
        });
    </script>
</body>
</html>
